defaults:
  language_default: en
  excerpt_max_chars: 200
  fetch_timeout_seconds: 30

sources:
  # === English: HN / Reddit / GitHub Trending / Product Hunt / HuggingFace ===
  - id: hn
    type: hn_algolia
    enabled: true
    tier: 1
    keywords: [LLM, AI, agent, MCP, coding agent, multimodal, Claude, GPT, Cursor]
    limit: 30

  - id: reddit_localllama
    type: reddit
    enabled: true
    tier: 1
    subreddit: LocalLLaMA
    time_window: day
    limit: 10

  - id: reddit_claudeai
    type: reddit
    enabled: true
    tier: 1
    subreddit: ClaudeAI
    time_window: day
    limit: 10

  - id: reddit_openai
    type: reddit
    enabled: true
    tier: 1
    subreddit: OpenAI
    time_window: day
    limit: 10

  - id: reddit_singularity
    type: reddit
    enabled: true
    tier: 2
    subreddit: singularity
    time_window: day
    limit: 10

  - id: reddit_machinelearning
    type: reddit
    enabled: true
    tier: 2
    subreddit: MachineLearning
    time_window: day
    limit: 10

  - id: github_trending
    type: github_trending
    enabled: true
    tier: 1
    languages: [python, typescript, rust]
    since: daily
    ai_keywords: [ai, llm, agent, mcp, gpt, claude, multimodal, llama, diffusion, langchain]

  - id: product_hunt
    type: product_hunt
    enabled: false  # requires PRODUCT_HUNT_TOKEN
    tier: 2
    topic: artificial-intelligence
    limit: 10

  - id: huggingface_models
    type: huggingface
    enabled: true
    tier: 2
    category: models
    limit: 10

  - id: huggingface_spaces
    type: huggingface
    enabled: true
    tier: 2
    category: spaces
    limit: 10

  # === English Lab Blogs / Tech Media (RSS) ===
  # Anthropic doesn't ship an official RSS feed; using community-maintained
  # feed at https://github.com/Olshansk/rss-feeds (regenerated hourly).
  # If this stops working, swap to RSSHub /anthropic route or self-host.
  - id: anthropic_blog
    type: rss
    enabled: true
    tier: 1
    url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml
    language: en

  - id: openai_blog
    type: rss
    enabled: true
    tier: 1
    url: https://openai.com/blog/rss.xml
    language: en

  - id: google_ai_blog
    type: rss
    enabled: true
    tier: 2
    url: https://blog.google/technology/ai/rss/
    language: en

  # Mistral has no official RSS; using same community-maintained feed source
  # as anthropic_blog. Same caveat applies — if it stops working, swap or disable.
  - id: mistral_blog
    type: rss
    enabled: true
    tier: 2
    url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_mistral.xml
    language: en

  - id: techcrunch_ai
    type: rss
    enabled: true
    tier: 2
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    language: en

  - id: venturebeat_ai
    type: rss
    enabled: true
    tier: 2
    url: https://venturebeat.com/category/ai/feed/
    language: en

  # === X / Twitter (twitterapi.io) ===
  - id: twitter_tier1
    type: twitter
    enabled: false  # requires TWITTERAPI_IO_KEY
    tier: 1
    handles:
      - karpathy
      - simonw
      - swyx
      - AlexAlbert__
      - AnthropicAI
      - sama
      - gdb
      - aravsrinivas
      - hwchase17
      - logangkilpatrick
      - c_valenzuelab
      - itsPaulAi
      - op7418
      - dotey
      - steipete
      - emollick
      - deepseek_ai
      - kaifulee
      - Cursor
      - Replit
    per_handle_limit: 10
    time_window_hours: 24

  - id: twitter_tier2
    type: twitter
    enabled: false  # spot-check needed
    tier: 2
    handles:
      - saj_adib
      - chaseleantj
      - icreatelife
      - andrewallenxo
      - iwoszapar
    per_handle_limit: 10
    time_window_hours: 24

  # === Threads (Meta API) ===
  - id: threads_keyword
    type: threads
    enabled: false  # requires THREADS_ACCESS_TOKEN
    tier: 1
    mode: keyword
    search_type: TOP
    queries:
      - Claude
      - Cursor
      - MCP
      - coding agent
      - Codex
      - OpenAI
      - Anthropic
      - Gemini
      - AI startup
      - Sora
      - Veo
      - Suno
      - Midjourney
      - Runway
      - AI 工具
      - 生成式 AI
      - AI 應用
    per_query_limit: 5
    time_window_hours: 24

  - id: threads_topic_tag
    type: threads
    enabled: false  # requires THREADS_ACCESS_TOKEN
    tier: 1
    mode: tag
    search_type: TOP
    queries:
      - AI
      - Generative AI
      - AI Tools
    per_query_limit: 10
    time_window_hours: 24

  - id: threads_user_handles
    type: threads
    enabled: false  # skeleton
    tier: 2
    mode: user
    handles: []

  # === Chinese (Mainland) ===
  - id: zhihu_hot
    type: rsshub
    enabled: true
    tier: 1
    path: /zhihu/hot
    language: zh-CN

  # weibo / dcard via public RSSHub instances all return 503 (heavy
  # anti-scrape on target sites). Stays disabled until self-host RSSHub
  # (spec Appendix D).
  - id: weibo_search_ai
    type: rsshub
    enabled: false
    tier: 2
    path: /weibo/search/AI
    language: zh-CN

  # Direct RSS for major Chinese tech media — no RSSHub dependency.
  - id: 36kr_feed
    type: rss
    enabled: true
    tier: 2
    url: https://36kr.com/feed
    language: zh-CN

  - id: ifanr_feed
    type: rss
    enabled: true
    tier: 2
    url: https://www.ifanr.com/feed
    language: zh-CN

  - id: ithome_cn
    type: rss
    enabled: true
    tier: 2
    url: https://www.ithome.com/rss/
    language: zh-CN

  - id: wechat_qbitai
    type: wewe_rss
    enabled: false  # PoC: wewe-rss not self-hosted
    tier: 1
    account_id: qbitai
    language: zh-CN

  - id: wechat_appso
    type: wewe_rss
    enabled: false
    tier: 1
    account_id: appsolution
    language: zh-CN

  - id: wechat_36kr_ai
    type: wewe_rss
    enabled: false
    tier: 2
    account_id: thirtysix_kr_ai
    language: zh-CN

  - id: wechat_jqzx_pro
    type: wewe_rss
    enabled: false
    tier: 2
    account_id: almosthuman_pro
    language: zh-CN

  # === Chinese (Taiwan) ===
  - id: ithome_ai
    type: rss
    enabled: true
    tier: 2
    url: https://www.ithome.com.tw/rss/category/ai
    language: zh-TW

  # INSIDE 硬塞: previous /feed/ai endpoint returns 404. No discoverable
  # public RSS endpoint. Disabled for now — revisit via RSSHub or
  # Anthropic-style community feed if needed.
  - id: inside_ai
    type: rss
    enabled: false
    tier: 2
    url: https://www.inside.com.tw/feed/ai
    language: zh-TW

  # Same RSSHub instance limitations as weibo_search_ai. Disabled until
  # self-host. Threads in TW probably covers similar discussion better anyway.
  - id: dcard_engineer
    type: rsshub
    enabled: false
    tier: 2
    path: /dcard/posts/工程師
    language: zh-TW

  # BlockTempo is a crypto-focused TW outlet, but their /category/ai/ feed is
  # editor-curated AI-only content (OpenAI / Anthropic / Google AI / agent
  # business news in zh-TW). Bypasses spec's blanket "no crypto" rule because
  # the curated subset is on-spec.
  - id: blocktempo_ai
    type: rss
    enabled: true
    tier: 2
    url: https://www.blocktempo.com/category/ai/feed/
    language: zh-TW
