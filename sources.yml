  # === Threads (Meta API) ===
  # ⚠️ Threads keyword/tag search returns ONLY the test user's own posts
  # while the Meta app is in Development mode. To search the full public
  # Threads firehose, the app must pass Meta App Review and go Live —
  # which is a heavy lift for personal use cases (privacy policy, ToS,
  # production deployment proof, justification of use case).
  # See BACKLOG.md "Threads keyword search dead-end" for path forward.
  - id: threads_keyword
    type: threads_apify
    # Disabled 2026-05-08: Apify actor D15iJFBNZ9wgeWAhw 持續 400 (payload schema)。
    # 8 天連續失敗，retry 救不回。待換 actor (memory: reference_threads_apify_scrapers
    # 提到 Apify Marketplace 有 10+ 替代 actor)。重啟前先 smoke test 確認新 actor 通。
    enabled: false
    tier: 1
    queries:
      - Claude
      - Cursor
      - MCP
      - coding agent
      - Codex
      - OpenAI
      - Anthropic
      - Gemini
      - AI startup
      - Sora
      - Veo
      - Suno
      - Midjourney
      - Runway
      - AI 工具
      - 生成式 AI
      - AI 應用
    per_query_limit: 2
    sort_by_recent: true

  - id: threads_topic_tag
    type: threads_apify
    enabled: false  # smoke run 2026-04-26 showed hashtag search returns mostly off-topic
    # spam (#AI hits cornstarch trends, viral reels, student-cheating tools).
    # threads_keyword above gives much higher signal density for the same cost.
    tier: 1
    queries:
      - "#AI"
      - "#GenerativeAI"
      - "#AITools"
    per_query_limit: 3
    sort_by_recent: true

  - id: threads_user_handles
    type: threads
    enabled: false  # skeleton
    tier: 2
    mode: user
    handles: []

